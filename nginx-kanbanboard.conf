# ============================================================
# Nginx location block for Kanban Board
#
# Add this block INSIDE your existing server { } block
# (the one that already handles mywebsite.com).
#
# Example path:  /etc/nginx/sites-available/mywebsite.com
# ============================================================

    # ── Kanban Board ──────────────────────────────────────────
    location /kanbanBoard/ {
        # Strip the /kanbanBoard/ prefix and forward to Node.js
        proxy_pass         http://127.0.0.1:3001/;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Resual-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
    # ─────────────────────────────────────────────────────────


# ============================================================
# After adding the block above, run:
#
#   sudo nginx -t                   # verify config
#   sudo systemctl reload nginx     # apply without downtime
# ============================================================
